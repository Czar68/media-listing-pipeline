version: '3.8'

services:
  # ── The Messaging Hub ──────────────────────────────────────────────────────
  # DNS resolution rule: workers MUST reference the SERVICE NAME "rabbitmq",
  # not the container_name "pipeline_broker". Docker's embedded DNS resolves
  # service names, not container names, across user-defined bridge networks.
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pipeline_broker
    ports:
      - "5672:5672"     # Messaging port
      - "15672:15672"   # Dashboard port (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s    # give RabbitMQ time to boot before first check
    restart: always
    networks:
      - pipeline_network

  # ── Persistent Storage ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: pipeline_postgres
    environment:
      POSTGRES_DB: media_pipeline
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pipeline_secret
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/docker/seeds:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d media_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s    # give Postgres time to init before first check
    restart: always
    networks:
      - pipeline_network

  # ── Worker 1: Identity (Who is this disc?) ─────────────────────────────────
  identity_worker:
    build: .
    container_name: identity_worker
    command: python core/ai_broker/identity_worker.py
    working_dir: /app                       # explicit WORKDIR guard
    env_file: .env                          # loads ACTIVE_DOMAIN etc.
    volumes:
      - .:/app
    environment:
      # Inline environment ALWAYS wins over env_file for the same key.
      # Use service names (not container_name) for Docker DNS resolution.
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql://admin:pipeline_secret@postgres:5432/media_pipeline
      - ACTIVE_DOMAIN=GAMES
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Maps host .env OCR_MODEL -> container GEMINI_MODEL (full model resource id).
      - GEMINI_MODEL=${OCR_MODEL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - pipeline_network

  # ── Worker 2: Financials (Is it profitable?) ───────────────────────────────
  financial_worker:
    build: .
    container_name: financial_worker
    command: python core/ai_broker/financial_worker.py
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql://admin:pipeline_secret@postgres:5432/media_pipeline
      - ACTIVE_DOMAIN=GAMES
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - pipeline_network

  # ── Worker 3: Listing (Write the eBay draft) ───────────────────────────────
  listing_worker:
    build: .
    container_name: listing_worker
    command: python core/ai_broker/listing_worker.py
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
      - ./data/drafts:/app/data/drafts
    environment:
      - RABBITMQ_HOST=rabbitmq
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql://admin:pipeline_secret@postgres:5432/media_pipeline
      - EBAY_PRODUCTION=false
      - ACTIVE_DOMAIN=GAMES
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Maps host .env LISTING_MODEL -> container GEMINI_MODEL.
      - GEMINI_MODEL=${LISTING_MODEL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - pipeline_network

  # ── Worker 4: Ingress (The Watcher) ───────────────────────────────────────
  ingress_monitor:
    build: .
    container_name: ingress_monitor
    command: python scripts/ingress_monitor.py
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    environment:
      # RABBITMQ_HOST must be the Docker service name — ingress_monitor.py
      # defaults to 'rabbitmq' but we make it explicit here.
      - RABBITMQ_HOST=rabbitmq
      # INGRESS_DIR must point to the volume-mounted path inside the container.
      # Without this, the script would build a path relative to its __file__
      # location which may differ from the actual bind-mount target.
      - INGRESS_DIR=/app/data/ingress
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - pipeline_network

  # ── Worker 5: Ingress Orchestrator v3 (Disc-Only Video Games) ─────────────
  # Replaces ingress_monitor for marathon scanning sessions.
  # Sweeps raw/ and ingress/ on startup, then watches ingress/ live.
  ingress_orchestrator_v3:
    build: .
    container_name: ingress_orchestrator_v3
    command: python scripts/ingress_orchestrator_v3.py
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_QUEUE=manifest_pipeline_v2
      - INGRESS_DIR=/app/data/ingress
      - RAW_DIR=/app/data/storage/raw
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - pipeline_network

  # TODO: Fix integration with google-genai and update 'os' imports before re-enabling.
  # ebay-arbitrage-scanner:
  #   build: .
  #   container_name: ebay-arbitrage-scanner
  #   command: python scripts/ebay_arbitrage_scanner.py
  #   working_dir: /app
  #   env_file: .env
  #   volumes:
  #     - .:/app
  #   environment:
  #     - RABBITMQ_HOST=rabbitmq
  #     - GOOGLE_API_KEY=${GOOGLE_API_KEY}
  #     - GEMINI_MODEL=${OCR_MODEL}
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   restart: on-failure
  #   networks:
  #     - pipeline_network

# ── Shared User-Defined Bridge Network ─────────────────────────────────────
# A named user-defined bridge is REQUIRED for Docker's embedded DNS to
# resolve service names between containers. The default bridge network does
# NOT provide automatic DNS on all Docker/WSL2 configurations.
networks:
  pipeline_network:
    driver: bridge

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  pg_data:
